<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="icon" type="image/png" sizes="256x256" href="favicon.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      --accent:       #818cf8;
      --accent-soft:  rgba(129,140,248,.14);
      --spot:         rgba(129,140,248,.12);
      --bg:           #0d0e12;
      --card:         rgba(255,255,255,.035);
      --card-border:  rgba(255,255,255,.09);
      --text:         #f3f4f6;
      --muted:        #9599a4;
      --icon:         #aab0bd;
      --radius:       12px;
    }
    body.light {
      --accent:       #6366f1;
      --accent-soft:  rgba(99,102,241,.10);
      --spot:         rgba(99,102,241,.10);
      --bg:           #faf9f7;
      --card:         #ffffff;
      --card-border:  #ececea;
      --text:         #18181b;
      --muted:        #6b6b72;
      --icon:         #71717a;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
      background: var(--bg); color: var(--text);
      -webkit-font-smoothing: antialiased;
      padding: 40px 20px 56px; min-height: 100dvh; position: relative;
      transition: background .45s ease, color .45s ease;
    }
    .spotlight {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: radial-gradient(600px circle at var(--mx,50%) var(--my,0%), var(--spot), transparent 70%);
      transition: background .15s ease-out;
    }

    .wrap { position: relative; z-index: 1; max-width: 720px; margin: 0 auto; }

    .back {
      display: inline-flex; align-items: center; gap: 7px;
      color: var(--muted); text-decoration: none; font-size: .86rem; font-weight: 500;
      padding: 6px 12px; border: 1px solid var(--card-border); border-radius: 999px;
      transition: color .2s, border-color .2s, transform .2s; background: var(--card);
    }
    .back:hover { color: var(--accent); border-color: var(--accent); transform: translateX(-2px); }
    .back svg { width: 14px; height: 14px; fill: currentColor; }

    .head { margin: 22px 0 20px; }
    .head h1 { font-size: 1.6rem; font-weight: 800; letter-spacing: -.02em; }
    .head p  { margin-top: 6px; color: var(--muted); font-size: .92rem; }

    .grid { display: grid; gap: 10px; grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); }

    .card {
      display: flex; align-items: flex-start; gap: 11px;
      padding: 11px 13px; cursor: pointer;
      background: var(--card); border: 1px solid var(--card-border);
      border-radius: var(--radius); text-decoration: none; color: var(--text);
      transition: transform .16s, border-color .16s, background .16s;
      opacity: 0; transform: translateY(8px); animation: reveal .45s cubic-bezier(.2,.7,.2,1) forwards;
    }
    .card:hover { transform: translateY(-2px); border-color: var(--accent); background: rgba(255,255,255,.05); }
    body.light .card:hover { background: rgba(0,0,0,.03); }
    @keyframes reveal { to { opacity: 1; transform: translateY(0); } }

    .ic {
      flex: 0 0 auto; width: 38px; height: 38px; border-radius: 9px;
      display: grid; place-items: center; overflow: hidden;
      background: var(--accent-soft); color: var(--icon);
      transition: color .2s;
    }
    .card:hover .ic { color: var(--accent); }
    .ic svg { width: 20px; height: 20px; fill: currentColor; }

    .main { flex: 1; min-width: 0; padding-top: 1px; }
    .row1 { display: flex; align-items: center; gap: 7px; }
    .title { font-weight: 600; font-size: .9rem; line-height: 1.25; flex: 1; min-width: 0; }
    .badge { font-size: .64rem; font-weight: 600; color: var(--accent); background: var(--accent-soft); padding: 2px 7px; border-radius: 999px; white-space: nowrap; }
    .arrow { color: var(--muted); opacity: .5; transition: transform .16s, color .16s, opacity .16s; flex: 0 0 auto; }
    .card:hover .arrow { color: var(--accent); opacity: 1; transform: translateX(2px); }
    .arrow svg { width: 14px; height: 14px; fill: currentColor; display: block; }

    .desc { margin-top: 3px; color: var(--muted); font-size: .8rem; line-height: 1.4; }

    .footer { text-align: center; margin-top: 28px; color: var(--muted); font-size: .78rem; }

    .modal-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,.65);
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      display: none; justify-content: center; align-items: flex-start;
      padding: 40px 16px; overflow-y: auto;
      opacity: 0; transition: opacity .25s ease;
    }
    .modal-overlay.open { display: flex; }
    .modal-overlay.visible { opacity: 1; }
    body.light .modal-overlay { background: rgba(0,0,0,.35); }

    .modal {
      width: 100%; max-width: 560px;
      background: var(--bg); border: 1px solid var(--card-border);
      border-radius: 18px; box-shadow: 0 30px 80px rgba(0,0,0,.5);
      padding: 28px 24px 24px;
      transform: translateY(16px) scale(.97); transition: transform .3s cubic-bezier(.2,.7,.2,1);
      position: relative;
    }
    body.light .modal { background: #fff; box-shadow: 0 20px 60px rgba(0,0,0,.12); }
    .modal-overlay.visible .modal { transform: translateY(0) scale(1); }

    .modal-close {
      position: absolute; top: 14px; right: 14px;
      width: 30px; height: 30px; display: grid; place-items: center;
      border-radius: 50%; cursor: pointer; color: var(--text);
      background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2);
      transition: color .2s, border-color .2s, background .2s;
    }
    .modal-close:hover { color: var(--accent); border-color: var(--accent); background: rgba(255,255,255,.15); }
    body.light .modal-close { background: rgba(0,0,0,.06); border-color: rgba(0,0,0,.14); color: var(--text); }
    body.light .modal-close:hover { background: rgba(0,0,0,.1); }
    .modal-close svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; }

    .modal-icon {
      width: 48px; height: 48px; border-radius: 12px;
      display: grid; place-items: center;
      background: var(--accent-soft); color: var(--icon);
      margin-bottom: 16px;
    }
    .modal-icon svg { width: 26px; height: 26px; fill: currentColor; }

    .modal h2 { font-size: 1.25rem; font-weight: 700; letter-spacing: -.01em; margin-bottom: 4px; }
    .modal .modal-badge { font-size: .72rem; font-weight: 600; color: var(--accent); background: var(--accent-soft); padding: 3px 9px; border-radius: 999px; display: inline-block; margin-bottom: 14px; }
    .modal .modal-desc { color: var(--muted); font-size: .9rem; line-height: 1.6; margin-bottom: 18px; }

    .modal-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 18px; }
    .modal-tag {
      font-size: .72rem; font-weight: 500; color: var(--text);
      background: var(--card); border: 1px solid var(--card-border);
      padding: 4px 10px; border-radius: 8px;
    }

    .modal-screenshots { display: flex; flex-direction: column; gap: 10px; margin-bottom: 18px; }
    .modal-screenshots img {
      width: 100%; border-radius: 10px;
      border: 1px solid var(--card-border);
      object-fit: cover;
    }

    .modal-features { margin-bottom: 6px; }
    .modal-features h3 { font-size: .82rem; font-weight: 600; margin-bottom: 8px; color: var(--text); }
    .modal-features ul { list-style: none; padding: 0; }
    .modal-features li {
      position: relative; padding-left: 16px;
      color: var(--muted); font-size: .82rem; line-height: 1.6;
    }
    .modal-features li::before {
      content: ''; position: absolute; left: 0; top: 8px;
      width: 5px; height: 5px; border-radius: 50%; background: var(--accent);
    }

    .theme-toggle {
      position: fixed; top: 18px; right: 18px; z-index: 10;
      width: 42px; height: 42px; display: grid; place-items: center;
      border-radius: 50%; cursor: pointer;
      background: var(--card); border: 1px solid var(--card-border); color: var(--text);
      transition: transform .2s, background .45s, border-color .45s;
    }
    .theme-toggle:hover { transform: rotate(20deg) scale(1.06); }
    .theme-toggle svg { width: 19px; height: 19px; fill: currentColor; }
    .theme-toggle .sun  { display: none; }
    body.light .theme-toggle .sun  { display: block; }
    body.light .theme-toggle .moon { display: none; }

    .nda-label {
      font-size: .58rem; font-weight: 600; color: var(--muted);
      background: rgba(255,255,255,.06); border: 1px solid var(--card-border);
      padding: 1px 5px; border-radius: 4px; white-space: nowrap; margin-left: auto;
    }
    body.light .nda-label { background: rgba(0,0,0,.04); }

    .cta-section {
      text-align: center; margin-top: 32px; padding: 28px 0 0;
      border-top: 1px solid var(--card-border);
    }
    .cta-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 6px; }
    .cta-sub { color: var(--muted); font-size: .85rem; margin-bottom: 16px; }
    .cta-buttons { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
    .cta-btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 10px 20px; border-radius: 10px; font-size: .85rem; font-weight: 600;
      text-decoration: none; transition: transform .16s, box-shadow .16s;
    }
    .cta-btn:hover { transform: translateY(-2px); }
    .cta-btn.primary {
      background: var(--accent); color: #fff;
      box-shadow: 0 4px 14px rgba(129,140,248,.3);
    }
    .cta-btn.primary:hover { box-shadow: 0 6px 20px rgba(129,140,248,.4); }
    .cta-btn.secondary {
      background: var(--card); color: var(--text);
      border: 1px solid var(--card-border);
    }
    .cta-btn svg { width: 16px; height: 16px; fill: currentColor; }

    .modal-result { font-size: .85rem; font-weight: 600; color: var(--accent); margin-bottom: 14px; }

    @media (max-width: 520px) {
      .grid { grid-template-columns: 1fr; }
      .head h1 { font-size: 1.4rem; }
      body { padding: 28px 16px 40px; }
      .modal { padding: 24px 18px 20px; }
      .modal-overlay { padding: 24px 12px; }
    }
    @media (hover: none) { .spotlight { display: none; } }
  </style>
</head>

    function renderProjects() {
      const grid = document.getElementById("grid");
      PROJECTS.forEach((p, i) => {
        const card = document.createElement("div");
        card.className = "card";
        card.style.animationDelay = (0.03 + i * 0.04) + "s";
        card.addEventListener("click", () => openModal(i));

        const ic = document.createElement("div");
        ic.className = "ic";
        ic.innerHTML = ICONS[p.icon] || ICONS.layout;

        const main = document.createElement("div"); main.className = "main";
        const row1 = document.createElement("div"); row1.className = "row1";
        const t = document.createElement("span"); t.className = "title"; t.textContent = p.title;
        row1.appendChild(t);
        if (p.badge) { const b = document.createElement("span"); b.className = "badge"; b.textContent = p.badge; row1.appendChild(b); }
        const nda = document.createElement("span"); nda.className = "nda-label"; nda.textContent = "под NDA";
        row1.appendChild(nda);
        const a = document.createElement("span"); a.className = "arrow"; a.innerHTML = ARROW; row1.appendChild(a);

        const d = document.createElement("div"); d.className = "desc"; d.textContent = p.desc;
        main.append(row1, d);
        card.append(ic, main);
        grid.appendChild(card);
      });
    }

    function openModal(i) {
      const p = PROJECTS[i];
      const modal = document.getElementById("modal");

      let screenshotsHTML = '';
      if (p.screenshots && p.screenshots.length) {
        screenshotsHTML = '<div class="modal-screenshots">' +
          p.screenshots.map(s => '<img src="' + s + '" alt="Скриншот проекта" loading="lazy" />').join('') +
          '</div>';
      }

      let featuresHTML = '';
      if (p.features && p.features.length) {
        featuresHTML = '<div class="modal-features"><h3>Реализовано</h3><ul>' +
          p.features.map(f => '<li>' + f + '</li>').join('') +
          '</ul></div>';
      }

      modal.innerHTML =
        '<button class="modal-close" id="modalClose">' + CLOSE + '</button>' +
        '<div class="modal-icon">' + (ICONS[p.icon] || ICONS.layout) + '</div>' +
        '<h2>' + p.title + '</h2>' +
        (p.badge ? '<span class="modal-badge">' + p.badge + '</span>' : '') +
        '<p class="modal-desc">' + p.detail + '</p>' +
        (p.result ? '<div class="modal-result">' + p.result + '</div>' : '') +
        '<div class="modal-tags">' + p.tags.map(t => '<span class="modal-tag">' + t + '</span>').join('') + '</div>' +
        screenshotsHTML +
        featuresHTML;

      const overlay = document.getElementById("modalOverlay");
      overlay.classList.add("open");
      overlay.scrollTop = 0;
      requestAnimationFrame(() => {
        requestAnimationFrame(() => overlay.classList.add("visible"));
      });

      document.getElementById("modalClose").addEventListener("click", closeModal);
      overlay.addEventListener("click", handleOverlayClick);
      document.addEventListener("keydown", onEsc);
    }

    function handleOverlayClick(e) {
      if (e.target === document.getElementById("modalOverlay")) closeModal();
    }

    function closeModal() {
      const overlay = document.getElementById("modalOverlay");
      overlay.classList.remove("visible");
      overlay.removeEventListener("click", handleOverlayClick);
      document.removeEventListener("keydown", onEsc);
      setTimeout(() => overlay.classList.remove("open"), 280);
    }

    function onEsc(e) { if (e.key === "Escape") closeModal(); }

    function setupSpotlight() {
      const sp = document.getElementById("spotlight");
      window.addEventListener("pointermove", e => {
        sp.style.setProperty("--mx", e.clientX + "px");
        sp.style.setProperty("--my", e.clientY + "px");
      });
    }

    function setupTheme(){
      const saved = localStorage.getItem("theme");
      const systemLight = window.matchMedia("(prefers-color-scheme: light)").matches;
      const initial = saved || (systemLight ? "light" : "dark");
      if (initial === "light") document.body.classList.add("light");

      document.getElementById("themeToggle").addEventListener("click", ()=>{
        document.body.classList.toggle("light");
        localStorage.setItem("theme", document.body.classList.contains("light") ? "light" : "dark");
      });

      window.matchMedia("(prefers-color-scheme: light)").addEventListener("change", e=>{
        if (localStorage.getItem("theme")) return;
        document.body.classList.toggle("light", e.matches);
      });
    }

    renderProjects();
    setupTheme();
    setupSpotlight();
  </script>
