  <style>
    /* =========================================================
       ТЁМНАЯ ТЕМА (по умолчанию). Один акцент — меняется здесь.
       ========================================================= */
    :root {
      --accent:       #818cf8;
      --accent-soft:  rgba(129,140,248,.14);
      --spot:         rgba(129,140,248,.13);
      --bg:           #0d0e12;
      --card:         rgba(255,255,255,.035);
      --card-border:  rgba(255,255,255,.09);
      --text:         #f3f4f6;
      --muted:        #9599a4;
      --btn:          rgba(255,255,255,.04);
      --btn-border:   rgba(255,255,255,.085);
      --icon:         #aab0bd;
      --card-shadow:  0 24px 70px rgba(0,0,0,.5);
      --radius:       22px;
      --radius-btn:   14px;
    }
    /* СВЕТЛАЯ ТЕМА */
    body.light {
      --accent:       #6366f1;
      --accent-soft:  rgba(99,102,241,.10);
      --spot:         rgba(99,102,241,.10);
      --bg:           #faf9f7;
      --card:         #ffffff;
      --card-border:  #ececea;
      --text:         #18181b;
      --muted:        #6b6b72;
      --btn:          #ffffff;
      --btn-border:   #e8e8e4;
      --icon:         #71717a;
      --card-shadow:  0 20px 50px rgba(24,24,27,.10);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { min-height: 100%; }

    body {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      display: flex; justify-content: center; align-items: flex-start;
      padding: 40px 16px 56px;
      min-height: 100dvh;
      position: relative;
      transition: background .45s ease, color .45s ease;
    }

    /* Спотлайт за курсором */
    .spotlight {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: radial-gradient(560px circle at var(--mx, 50%) var(--my, 0%), var(--spot), transparent 70%);
      transition: background .15s ease-out;
    }

    /* Переключатель темы */
    .theme-toggle {
      position: fixed; top: 18px; right: 18px; z-index: 10;
      width: 42px; height: 42px; display: grid; place-items: center;
      border-radius: 50%; cursor: pointer;
      background: var(--btn); border: 1px solid var(--btn-border); color: var(--text);
      transition: transform .2s, background .45s, border-color .45s;
    }
    .theme-toggle:hover { transform: rotate(20deg) scale(1.06); }
    .theme-toggle svg { width: 19px; height: 19px; fill: currentColor; }
    .theme-toggle .sun  { display: none; }
    body.light .theme-toggle .sun  { display: block; }
    body.light .theme-toggle .moon { display: none; }

    /* ===================== КАРТОЧКА ===================== */
    .card {
      position: relative; z-index: 1;
      width: 100%; max-width: 430px;
      background: var(--card);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      box-shadow: var(--card-shadow);
      padding: 30px 26px 24px;
      transition: background .45s, border-color .45s, box-shadow .45s;
    }

    .topbar { display: flex; justify-content: flex-end; margin-bottom: 4px; }
    .share-btn {
      width: 34px; height: 34px; display: grid; place-items: center;
      border-radius: 50%; cursor: pointer; color: var(--icon);
      background: transparent; border: 1px solid var(--btn-border);
      transition: color .2s, border-color .2s, transform .2s;
    }
    .share-btn:hover { color: var(--accent); border-color: var(--accent); transform: translateY(-1px); }
    .share-btn svg { width: 15px; height: 15px; fill: currentColor; }

    /* ===================== ПРОФИЛЬ ===================== */
    .profile { text-align: center; }
    .avatar {
      width: 96px; height: 96px; margin: 0 auto 16px;
      border-radius: 50%;
      border: 1px solid var(--card-border);
      box-shadow: 0 0 0 4px var(--accent-soft);
      object-fit: cover; overflow: hidden;
      display: grid; place-items: center;
      background: var(--btn); color: var(--accent);
      font-weight: 700; font-size: 32px;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }

    .name { font-size: 1.55rem; font-weight: 700; letter-spacing: -.02em; }
    .status {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 8px; font-size: .78rem; color: var(--muted);
    }
    .status .dot {
      width: 7px; height: 7px; border-radius: 50%; background: #22c55e;
      box-shadow: 0 0 0 0 rgba(34,197,94,.5); animation: pulse 2.2s infinite;
    }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(34,197,94,.5); }
      70%  { box-shadow: 0 0 0 7px rgba(34,197,94,0); }
      100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
    }
    .title { margin-top: 10px; color: var(--muted); font-size: .95rem; line-height: 1.5; }

    /* ===================== СОЦСЕТИ ===================== */
    .socials { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; margin: 20px 0 4px; }
    .social {
      width: 40px; height: 40px; display: grid; place-items: center;
      border-radius: 50%; color: var(--icon);
      background: var(--btn); border: 1px solid var(--btn-border);
      transition: color .2s, border-color .2s, transform .2s;
    }
    .social:hover { color: var(--accent); border-color: var(--accent); transform: translateY(-3px); }
    .social svg { width: 18px; height: 18px; fill: currentColor; }

    /* ===================== КНОПКИ ===================== */
    .links { display: flex; flex-direction: column; gap: 10px; margin-top: 18px; }
    .link-btn {
      display: flex; align-items: center; gap: 13px;
      padding: 13px 15px;
      background: var(--btn); border: 1px solid var(--btn-border);
      border-radius: var(--radius-btn); text-decoration: none; color: var(--text);
      transition: border-color .2s, transform .2s, box-shadow .2s, background .2s;
    }
    .link-btn:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
      box-shadow: 0 8px 22px var(--accent-soft);
    }
    .link-ico { flex: 0 0 auto; width: 24px; display: grid; place-items: center; color: var(--icon); transition: color .2s; }
    .link-btn:hover .link-ico { color: var(--accent); }
    .link-ico svg { width: 19px; height: 19px; fill: currentColor; }
    .link-ico .emoji { font-size: 18px; }
    .link-title { flex: 1; font-weight: 500; font-size: .96rem; }
    .link-arrow { flex: 0 0 auto; color: var(--icon); opacity: .5; transition: transform .2s, color .2s, opacity .2s; }
    .link-btn:hover .link-arrow { color: var(--accent); opacity: 1; transform: translateX(3px); }
    .link-arrow svg { width: 15px; height: 15px; fill: currentColor; }

    /* ===================== ФУТЕР ===================== */
    .footer { text-align: center; margin-top: 22px; color: var(--muted); font-size: .78rem; }

    /* ===================== TOAST ===================== */
    .toast {
      position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%) translateY(20px);
      background: var(--text); color: var(--bg);
      padding: 11px 18px; border-radius: 12px; font-size: .88rem; font-weight: 500;
      opacity: 0; pointer-events: none; transition: opacity .25s, transform .25s; z-index: 50;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ===================== REVEAL-АНИМАЦИЯ ===================== */
    .reveal { opacity: 0; transform: translateY(14px); animation: reveal .6s cubic-bezier(.2,.7,.2,1) forwards; }
    @keyframes reveal { to { opacity: 1; transform: translateY(0); } }

    @media (hover: none) { .spotlight { display: none; } }
    @media (max-width: 380px) { .name { font-size: 1.4rem; } .card { padding: 26px 20px 22px; } }

    const ARROW = '<svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg>';

    function getInitials(n){ return n.trim().split(/\s+/).slice(0,2).map(w=>w[0]?w[0].toUpperCase():"").join(""); }

    function renderProfile(){
      document.getElementById("name").textContent = CONFIG.name;
      document.getElementById("title").textContent = CONFIG.title;
      const st = document.getElementById("status");
      if (CONFIG.status) document.getElementById("statusText").textContent = CONFIG.status;
      else st.style.display = "none";
      const av = document.getElementById("avatar");
      if (CONFIG.avatar){ const i=document.createElement("img"); i.src=CONFIG.avatar; i.alt=CONFIG.name; av.appendChild(i); }
      else av.textContent = getInitials(CONFIG.name);
    }
    function renderSocials(){
      const box=document.getElementById("socials");
      CONFIG.socials.forEach(s=>{
        const ic = ICONS[s.type]; if(!ic) return;
        const a=document.createElement("a");
        a.className="social"; a.href=s.url; a.target="_blank"; a.rel="noopener noreferrer";
        a.setAttribute("aria-label", s.type); a.innerHTML=ic;
        box.appendChild(a);
      });
    }
    function renderButtons(){
      const box=document.getElementById("links");
      CONFIG.buttons.forEach((b,i)=>{
        const a=document.createElement("a");
        a.className="link-btn reveal"; a.href=b.url; a.target="_blank"; a.rel="noopener noreferrer";
        a.style.animationDelay = (0.38 + i*0.05) + "s";
        const ico=document.createElement("span"); ico.className="link-ico";
        if (ICONS[b.icon]) ico.innerHTML = ICONS[b.icon];
        else { const e=document.createElement("span"); e.className="emoji"; e.textContent=b.icon||"🔗"; ico.appendChild(e); }
        const t=document.createElement("span"); t.className="link-title"; t.textContent=b.title;
        const ar=document.createElement("span"); ar.className="link-arrow"; ar.innerHTML=ARROW;
        a.append(ico,t,ar); box.appendChild(a);
      });
    }
    function renderFooter(){ document.getElementById("footer").textContent = CONFIG.footerText; }

    function setupTheme(){
      const saved = localStorage.getItem("theme");
      const systemLight = window.matchMedia("(prefers-color-scheme: light)").matches;
      const initial = saved || (systemLight ? "light" : "dark") || CONFIG.defaultTheme;
      if (initial === "light") document.body.classList.add("light");

      document.getElementById("themeToggle").addEventListener("click", ()=>{
        document.body.classList.toggle("light");
        localStorage.setItem("theme", document.body.classList.contains("light") ? "light" : "dark");
      });

      window.matchMedia("(prefers-color-scheme: light)").addEventListener("change", e=>{
        if (localStorage.getItem("theme")) return;
        document.body.classList.toggle("light", e.matches);
      });
    }
    function setupSpotlight(){
      const sp=document.getElementById("spotlight");
      window.addEventListener("pointermove", e=>{
        sp.style.setProperty("--mx", e.clientX+"px");
        sp.style.setProperty("--my", e.clientY+"px");
      });
    }
    function setupShare(){
      const toast=document.getElementById("toast");
      const show=m=>{ toast.textContent=m; toast.classList.add("show"); setTimeout(()=>toast.classList.remove("show"),2200); };
      document.getElementById("shareBtn").addEventListener("click", async ()=>{
        const d={title:CONFIG.name,text:CONFIG.title,url:location.href};
        if(navigator.share){ try{ await navigator.share(d); }catch(e){} }
        else if(navigator.clipboard){ try{ await navigator.clipboard.writeText(location.href); show("Ссылка скопирована"); }catch(e){ show("Не удалось скопировать"); } }
        else show(location.href);
      });
    }

    renderProfile(); renderSocials(); renderButtons(); renderFooter();
    setupTheme(); setupSpotlight(); setupShare();
  </script>
</body>
